name: Smart Gate
version: 2.1.2
slug: smart_gate
description: Automatic AI powered license plate recognition gate opener
url: https://github.com/haos-eco/smart-gate
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
host_network: true
hassio_api: true
homeassistant_api: true
map:
  - config:rw
options:
  motion_entity: binary_sensor.ingresso_veicolo
  camera_entity: camera.ingresso_high_quality
  gate_switch: switch.cancello
  cooldown_sec: 120
  roi: "0.0,0.0,1.0,1.0"
  confidence: 0.5
  min_yolo_score: 0.65
  min_ocr_confidence: 0.75
  visitor_stop_sec: 5
  allowed_plates: []
  privacy_zones: []
  model_path: /config/www/smart_gate/models/yolo/model.onnx
  snapshot_path: /config/www/smart_gate/snapshot/latest.jpg
  history_dir: /config/www/smart_gate/snapshot/history
  logs_dir: /config/www/smart_gate/snapshot/logs
  debug_path: /config/www/smart_gate/snapshot/last_plate_crop.jpg
  notify_services: []
  notification_sound: default
  notify_on_failure: false
  keep_history: false
  keep_history_days: 30
  gpu: false
  debug: false
schema:
  motion_entity: str
  camera_entity: str
  gate_switch: str
  roi: str
  cooldown_sec: int
  confidence: float
  min_yolo_score: float
  min_ocr_confidence: float
  visitor_stop_sec: int?
  allowed_plates:
    - plate: str
      person_entity: str?
  privacy_zones:
    - label: str
      x1: int
      y1: int
      x2: int
      y2: int
  model_path: str
  snapshot_path: str
  history_dir: str
  logs_dir: str
  debug_path: str
  notify_services:
    - str
  notification_sound: str?
  notify_on_failure: bool
  keep_history: bool
  keep_history_days: int?
  gpu: bool
  debug: bool
